version: '3.8'

services:
  db:
    image: ankane/pgvector:latest
    container_name: digital_era_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: digital_era_db
    ports:
      - "5432:5432"
    volumes:
      - pg_vector_data:/var/lib/postgresql/data

volumes:
  pg_vector_data: